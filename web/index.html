<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <title>Ursus</title>
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
  <script src="https://unpkg.com/maplibre-gl@5.19.0/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@5.19.0/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    body { margin: 0; padding: 0; font-family: lato; }
    #map { position: absolute; top: 0; bottom: 0; width: 100%; }

    @font-face {
      font-family: "lato";
      src: url("https://ttomasz.github.io/ttursm/fonts/Lato-Regular.woff2") format('woff2');
    }

    @font-face {
      font-family: "lato";
      src: url("https://ttomasz.github.io/ttursm/fonts/Lato-Bold.woff2") format('woff2');
      font-weight: bold;
    }

    @font-face {
      font-family: "lato";
      src: url("https://ttomasz.github.io/ttursm/fonts/Lato-BoldItalic.woff2") format('woff2');
      font-weight: bold;
      font-style: italic;
    }

    @font-face {
      font-family: "lato";
      src: url("https://ttomasz.github.io/ttursm/fonts/Lato-Italic.woff2") format('woff2');
      font-style: italic;
    }

    /* Legend styling */
    .legend {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(255, 255, 255, 0.95);
      padding: 8px 10px;
      border-radius: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.25);
      font-size: 14px;
      color: #111;
      line-height: 20px;
      max-width: 260px;
    }
    .legend h4 { margin: 0 0 6px 0; font-size: 16px; }
    .legend ul { list-style: none; margin: 0; padding: 0; }
    .legend li { display: flex; align-items: center; margin: 4px 0; }
    .legend .swatch { width: 16px; height: 16px; margin-right: 8px; border-radius: 3px; flex: 0 0 16px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="legend" aria-hidden="false">
    <h4>Miejsca parkingowe naziemne:</h4>
    <ul>
      <li><span class="swatch" style="background: rgba(245, 131, 255, 0.7);"></span> dla klientów</li>
      <li><span class="swatch" style="background: rgba(64, 64, 64, 0.7);"></span> prywatne (np. mieszkańców)</li>
      <li><span class="swatch" style="background: rgba(20, 100, 200, 0.7);"></span> publiczne</li>
    </ul>
  </div>
  <script>
      const map = new maplibregl.Map({
         container: "map",
         style: "https://ttomasz.github.io/ttursm/map_style.json",
         dragRotate: false,
         hash: "map",
         maplibreLogo: true,
         minZoom: 12,
         maxZoom: 20,
         center: [20.8828989, 52.1960985],
         zoom: 15,
      });
      map.addControl(new maplibregl.NavigationControl(), "top-right");

      // Add click event for layers: parking_fill, shops_and_food_symbols, shops_and_food_clusters
      map.on('load', function() {
        ['parking_fill', 'shops_and_food_symbols'].forEach(layer => {
          map.on('click', layer, function(e) {
            if (!e.features || !e.features.length) return;
            const feature = e.features[0];
            const props = feature.properties;
            let html = '<div style="min-width:120px">';
            for (const key in props) {
              html += `<strong>${key}</strong>: ${props[key]}<br>`;
            }
            html += '</div>';
            new maplibregl.Popup()
              .setLngLat(e.lngLat)
              .setHTML(html)
              .addTo(map);
          });
          // Change cursor to pointer
          map.on('mouseenter', layer, function() {
            map.getCanvas().style.cursor = 'pointer';
          });
          map.on('mouseleave', layer, function() {
            map.getCanvas().style.cursor = '';
          });
        });
        // zoom when clicking cluster
        map.on('click', 'shops_and_food_clusters', function(e) {
          let features = map.queryRenderedFeatures(e.point, {
              layers: ['shops_and_food_clusters']
          });
          map
          .getSource('shops_and_food_points')
          .getClusterExpansionZoom(features[0].properties.cluster_id)
          .then(zoom => {
            map.easeTo({
                center: features[0].geometry.coordinates,
                zoom: zoom
            });
          });
        });
        // Change cursor to pointer
        map.on('mouseenter', 'shops_and_food_clusters', function() {
          map.getCanvas().style.cursor = 'pointer';
        });
        map.on('mouseleave', 'shops_and_food_clusters', function() {
          map.getCanvas().style.cursor = '';
        });
      });
  </script>
</body>
</html>
